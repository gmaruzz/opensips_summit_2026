        title: ASRDegraded
        condition: C
        noDataState: OK
        execErrState: Alerting
        for: 3m
        isPaused: false
        labels:
          severity: warning
          scope: gl
          anomaly_name: gl_asr
        annotations:
          summary: "Platform ASR below adaptive lower band"
          description: "Global ASR below lower adaptive band by >=10% of band width for >=3m while traffic was non-trivial. Customer impact likely. Drill into 51_GATEWAYS and 52_CUSTOMERS for the offending entity."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
