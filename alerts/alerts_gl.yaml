# Platform-wide (GL) band-breach alerts.
#
# Fires when a metric breaches its adaptive band by >= 10% of band
# width for 3 minutes, while the platform is busy (cc_outbound peaked
# > 100 in the last 15m).
#
# Direction per metric:
#   MOS, NER, ASR  -- lower breach only
#   PDD            -- upper breach only
#   CPS, CC        -- both sides

apiVersion: 1
groups:

  - orgId: 1
    name: GL_Quality
    folder: SIDIAL
    interval: 1m
    rules:

      - uid: gl-mos-degraded
        title: MOSDegraded
        condition: C
        noDataState: OK
        execErrState: Alerting
        for: 3m
        isPaused: false
        labels:
          severity: warning
          scope: gl
          anomaly_name: gl_mos
        annotations:
          summary: "Platform MOS below adaptive lower band"
          description: "Global MOS below lower adaptive band by >=10% of band width for >=3m, while platform was carrying >100 concurrent calls. Check RTPEngine instances, per-gateway MOS, recent carrier changes."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ff0jhwc3z0sn4e
            model:
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
              expr: |
                sum(
                  anomaly:level_2m{anomaly_name="gl_mos"}
                    < bool (
                        anomaly:lower_band{anomaly_name="gl_mos", anomaly_strategy="adaptive"}
                        - 0.10 * (
                            anomaly:upper_band{anomaly_name="gl_mos", anomaly_strategy="adaptive"}
                            - anomaly:lower_band{anomaly_name="gl_mos", anomaly_strategy="adaptive"}
                          )
                      )
                )
                *
                sum(max_over_time(opensips_GL_cc_outbound[15m]) > bool 100)
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource: { type: __expr__, uid: "-100" }
              conditions: []
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              datasource: { type: __expr__, uid: "-100" }
              conditions:
                - type: query
                  evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  query: { params: [B] }
                  reducer: { type: last, params: [] }

