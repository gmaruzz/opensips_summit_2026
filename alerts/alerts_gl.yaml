        isPaused: false
        labels:
          severity: critical    # CPS anomaly = outage signal; pages immediately, repeats hourly via nested policy in policies.yaml
          scope: gl
          anomaly_name: gl_cps
        annotations:
          summary: "Platform CPS outside adaptive band (drop or spike)"
          description: "Global calls-per-second outside adaptive band by >=10% of band width for >=3m. Drop = possible outage / carrier block; spike = possible flood / abuse. Recent 15m peaked at >100 concurrent."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: ff0jhwc3z0sn4e
            model:
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
              expr: |
                sum(
                  (anomaly:level_2m{anomaly_name="gl_cps"}
                    < bool (
                        anomaly:lower_band{anomaly_name="gl_cps", anomaly_strategy="adaptive"}
                        - 0.10 * (
                            anomaly:upper_band{anomaly_name="gl_cps", anomaly_strategy="adaptive"}
                            - anomaly:lower_band{anomaly_name="gl_cps", anomaly_strategy="adaptive"}
                          )
                      ))
                  +
                  (anomaly:level_2m{anomaly_name="gl_cps"}
                    > bool (
                        anomaly:upper_band{anomaly_name="gl_cps", anomaly_strategy="adaptive"}
                        + 0.10 * (
