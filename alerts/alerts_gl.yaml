                  anomaly:level_2m{anomaly_name="gl_ner"}
                    < bool (
                        anomaly:lower_band{anomaly_name="gl_ner", anomaly_strategy="adaptive"}
                        - 0.10 * (
                            anomaly:upper_band{anomaly_name="gl_ner", anomaly_strategy="adaptive"}
                            - anomaly:lower_band{anomaly_name="gl_ner", anomaly_strategy="adaptive"}
                          )
                      )
                )
                *
                sum(max_over_time(opensips_GL_cc_outbound[15m]) > bool 100)
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: "-100"
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource: { type: __expr__, uid: "-100" }
              conditions: []
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: "-100"
            model:
              refId: C
              type: threshold
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              datasource: { type: __expr__, uid: "-100" }
              conditions:
