        labels:
          anomaly_name: "ru_cc_connected"
          anomaly_type: "resource"
          anomaly_strategy: "adaptive"

  ##############################################################################
  #  PER-FS-NODE (AS) -- Helper rules                                          #
  #  AS entities are IPs with dots as underscores (e.g. 116_202_78_44)         #
  ##############################################################################

  - name: VoIPHelperAS
    rules:

      # --- Ratio KPI counters ---
      - record: voip:as:kpi_asr_ok
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_asr_ok", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_asr_ok"))
      - record: voip:as:kpi_asr_total
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_asr_total", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_asr_total"))

      - record: voip:as:kpi_ner_ok
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_ner_ok", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_ner_ok"))
      - record: voip:as:kpi_ner_total
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_ner_total", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_ner_total"))

      # --- CDR counters ---
      - record: voip:as:cdr_success
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_cdr_success", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_cdr_success"))
      - record: voip:as:cdr_failed
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_cdr_failed", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_cdr_failed"))

      # --- Sum/count latency KPI counters ---
      - record: voip:as:kpi_acd_sum
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_acd_sum", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_acd_sum"))
      - record: voip:as:kpi_acd_count
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_acd_count", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_acd_count"))

      - record: voip:as:kpi_pdd_sum
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_pdd_sum", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_pdd_sum"))
      - record: voip:as:kpi_pdd_count
        expr: sum by(fs_node) (label_replace({__name__=~"opensips_AS_.+_kpi_pdd_count", job="opensips"}, "fs_node", "$1", "__name__", "opensips_AS_(.+)_kpi_pdd_count"))

  ##############################################################################
  #  PER-FS-NODE (AS) -- Adaptive strategy                                     #
  ##############################################################################

  - name: AnomalyPerFSNodeAdaptive
    rules:

      # ASR per FreeSWITCH node
      - record: anomaly:requests:as_asr
        expr: |-
          rate(voip:as:kpi_asr_ok[5m])
          / clamp_min(rate(voip:as:kpi_asr_total[5m]), 0.001)
          * 100
        labels:
          anomaly_name: "as_asr"
          anomaly_type: "requests"
          anomaly_strategy: "adaptive"

      # NER per FS node
      - record: anomaly:requests:as_ner
        expr: |-
          rate(voip:as:kpi_ner_ok[5m])
          / clamp_min(rate(voip:as:kpi_ner_total[5m]), 0.001)
          * 100
        labels:
          anomaly_name: "as_ner"
          anomaly_type: "requests"
          anomaly_strategy: "adaptive"

      # CDR fail ratio per FS node
      - record: anomaly:errors:as_cdr_fail
        expr: |-
          rate(voip:as:cdr_failed[5m])
          / clamp_min(rate(voip:as:cdr_success[5m]) + rate(voip:as:cdr_failed[5m]), 0.001)
          * 100
        labels:
          anomaly_name: "as_cdr_fail_ratio"
          anomaly_type: "errors"
          anomaly_strategy: "adaptive"

      # ACD per FS node (seconds)
      - record: anomaly:latency:as_acd
        expr: |-
          rate(voip:as:kpi_acd_sum[5m])
          / clamp_min(rate(voip:as:kpi_acd_count[5m]), 0.001)
        labels:
          anomaly_name: "as_acd"
          anomaly_type: "latency"
          anomaly_strategy: "adaptive"

      # PDD per FS node (ms)
      - record: anomaly:latency:as_pdd
        expr: |-
          rate(voip:as:kpi_pdd_sum[5m])
          / clamp_min(rate(voip:as:kpi_pdd_count[5m]), 0.001)
        labels:
          anomaly_name: "as_pdd"
          anomaly_type: "latency"
          anomaly_strategy: "adaptive"

  ##############################################################################
  #  PER-FS-NODE (AS) -- Robust strategy                                       #
  ##############################################################################

  - name: AnomalyPerFSNodeRobust
    rules:

      # CPS per FS node (using cdr_success as proxy)
      - record: anomaly:requests:as_cps
        expr: |-
          rate(voip:as:cdr_success[5m])
        labels:
          anomaly_name: "as_cps"
          anomaly_type: "requests"
          anomaly_strategy: "adaptive"

  ##############################################################################
  #  RTPENGINE -- Per-instance metrics                                         #
  #  10 instances on 10.0.205.8-17:3344                                        #
  ##############################################################################

  - name: AnomalyRTPEngineAdaptive
    rules:

      # MOS per RTPEngine instance
      - record: anomaly:latency:rtpe_mos
        expr: |-
          rate(rtpengine_mos_total{job="rtpengine"}[5m])
          / clamp_min(rate(rtpengine_mos_samples_total{job="rtpengine"}[5m]), 0.001)
        labels:
          anomaly_name: "rtpe_mos"
          anomaly_type: "latency"
          anomaly_strategy: "adaptive"

      # Jitter per instance (ms)
      - record: anomaly:latency:rtpe_jitter
        expr: |-
          rate(rtpengine_jitter_total{job="rtpengine"}[5m])
          / clamp_min(rate(rtpengine_jitter_samples_total{job="rtpengine"}[5m]), 0.001)
        labels:
          anomaly_name: "rtpe_jitter"
          anomaly_type: "latency"
          anomaly_strategy: "adaptive"

      # Packet loss per instance (%)
      - record: anomaly:latency:rtpe_packetloss
        expr: |-
          rate(rtpengine_packetloss_total{job="rtpengine"}[5m])
          / clamp_min(rate(rtpengine_packetloss_samples_total{job="rtpengine"}[5m]), 0.001)
        labels:
          anomaly_name: "rtpe_packetloss"
          anomaly_type: "latency"
          anomaly_strategy: "adaptive"

  - name: AnomalyRTPEngineRobust
    rules:

      # Sessions per instance (bursty gauge)
      - record: anomaly:resource:rtpe_sessions
        expr: |-
          rtpengine_sessions{job="rtpengine", type="own"}
        labels:
          anomaly_name: "rtpe_sessions"
          anomaly_type: "resource"
          anomaly_strategy: "adaptive"

      # Port utilization per instance (%)
      - record: anomaly:resource:rtpe_ports
        expr: |-
          rtpengine_ports_used{job="rtpengine"}
          / clamp_min(rtpengine_ports{job="rtpengine"}, 1)
          * 100
        labels:
          anomaly_name: "rtpe_port_utilization"
          anomaly_type: "resource"
          anomaly_strategy: "adaptive"

  ##############################################################################
  #  INFRASTRUCTURE -- Per-node from node_exporter                             #
  #  job="prometheus" (non-standard label used in production)                  #
  ##############################################################################

  - name: AnomalyInfraAdaptive
    rules:

      # CPU % per node
      - record: anomaly:resource:node_cpu
        expr: |-
          (1 - avg by(instance, job) (
            irate(node_cpu_seconds_total{mode="idle", job="prometheus"}[2m])
          )) * 100
        labels:
          anomaly_name: "node_cpu"
          anomaly_type: "resource"
          anomaly_strategy: "adaptive"

      # RAM % per node
      - record: anomaly:resource:node_ram
        expr: |-
          (1 - node_memory_MemAvailable_bytes{job="prometheus"}
               / node_memory_MemTotal_bytes{job="prometheus"}) * 100
        labels:
          anomaly_name: "node_ram"
          anomaly_type: "resource"
          anomaly_strategy: "adaptive"

  - name: AnomalyInfraRobust
    rules:

      # UDP buffer overflow rate per node (any non-zero is bad)
      - record: anomaly:errors:node_udp_overflow
        expr: |-
          rate(node_netstat_Udp_RcvbufErrors{job="prometheus"}[5m])
        labels:
          anomaly_name: "node_udp_overflow"
          anomaly_type: "errors"
          anomaly_strategy: "adaptive"

      # Network RX bytes/s per node
      - record: anomaly:resource:node_network_rx
        expr: |-
          sum by(instance, job) (
            rate(node_network_receive_bytes_total{job="prometheus", device!="lo"}[5m])
          )
        labels:
          anomaly_name: "node_network_rx"
          anomaly_type: "resource"
          anomaly_strategy: "adaptive"
